<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>URI — Preview de link</title>

  <defs>
    <radialGradient id="halo" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#D97B29" stop-opacity="0.18"/>
      <stop offset="30%" stop-color="#D97B29" stop-opacity="0.07"/>
      <stop offset="65%" stop-color="#050504" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="feixe" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D97B29" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#D97B29" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="630" fill="#0E0E0C"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Luminária centralizada em x=600 -->
  <rect x="598" y="50" width="4" height="75" fill="#F5EFE3" opacity="0.5"/>
  <path d="M 520 125 L 680 125 A 80 80 0 0 0 520 125 Z" fill="#F5EFE3"/>
  <rect x="580" y="125" width="40" height="28" fill="#D97B29"/>

  <!-- Feixe -->
  <path d="M 565 153 L 635 153 L 780 410 L 420 410 Z" fill="url(#feixe)"/>
  <line x1="565" y1="153" x2="420" y2="410" stroke="#D97B29" stroke-width="1" opacity="0.25"/>
  <line x1="635" y1="153" x2="780" y2="410" stroke="#D97B29" stroke-width="1" opacity="0.25"/>

  <!-- Wordmark URI centralizado em x=600, largura total ~ 297 (u 110 + 14 respiro + r 117 + 14 respiro + i 22 + padding) -->
  <g transform="translate(480, 380)">
    <!-- U -->
    <path d="M 0 0 L 22 0 L 22 60 Q 22 68 55 68 Q 88 68 88 60 L 88 0 L 110 0 L 110 65 Q 110 90 55 90 Q 0 90 0 65 Z" fill="#F5EFE3"/>
    <path d="M 55 30 L 64 43 L 55 56 L 46 43 Z" fill="#D97B29"/>
    <!-- R com respiro 14 -->
    <g transform="translate(124, 0)">
      <path fill-rule="evenodd" d="M 0 0 L 82 0 Q 114 0 114 29 Q 114 51 92 55 L 117 90 L 90 90 L 70 58 L 22 58 L 22 90 L 0 90 L 0 0 Z M 22 16 L 80 16 Q 91 16 91 29 Q 91 42 80 42 L 22 42 Z" fill="#F5EFE3"/>
    </g>
    <!-- I com respiro -->
    <rect x="255" y="0" width="22" height="90" fill="#F5EFE3"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#A8A396">Que o seu trabalho chegue a quem precisa dele.</text>

  <!-- Footer metadata -->
  <text x="600" y="570" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="0.2em" fill="#6B6A63">URIADS.COM · LISBOA · RIO DE JANEIRO</text>
</svg>
